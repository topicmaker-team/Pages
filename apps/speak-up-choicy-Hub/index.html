<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>SpeakUp! Choicy — Waikiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,1,0&display=block" rel="stylesheet">
<style>
:root{
  --ink:#1b2434; --sub:#6b7685; --line:#e7e9ef; --bg:#ffffff;
  --blue:#00A6ED; --blue-d:#0784c2; --choicy:#0459b7;
  --coral:#ff6b5c; --coral-d:#e8503f;
  --great:#1ea96b; --close:#e0a008; --practice:#e2554b; --star:#ffc233;
  --r:16px; --shadow:0 6px 24px rgba(20,30,50,.08); --shadow-lg:0 18px 50px rgba(20,30,50,.16);
  --font-display:'Fredoka',-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
  --font-serif:'Lora',Georgia,"Times New Roman",serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
  color:var(--ink); background:#ffffff; -webkit-font-smoothing:antialiased}
h1,h2,.brand h1,.intro,.detail-head h2,.result-head h2{font-family:var(--font-display)}
.material-symbols-rounded{font-variation-settings:'FILL' 1,'wght' 500,'opsz' 24;line-height:1;user-select:none}
.ph-text,.ph-gap,.w-en,.exp-en,.said span{font-family:var(--font-serif)}
#app{max-width:960px;margin:0 auto;padding:74px 18px 22px;transition:opacity .12s ease;min-height:100vh}
.screen{animation:rise .25s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* subtitle (万次郎語) mode */
.sub-mj{display:none}
body.subtitle-on .sub-mj{display:block}

/* stars */
.stars{display:inline-flex;gap:1px;vertical-align:middle}
.star{font-size:18px} .star.on{color:var(--star)} .star.off{color:#d7dbe3}

/* ---------- Header ---------- */
#topbar{position:fixed;top:0;left:0;right:0;height:54px;z-index:100;background:#fff;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:6px;padding:0 10px}
.htitle{font-family:var(--font-display);font-size:20px;flex:1;text-align:center;white-space:nowrap}
.htitle b{color:var(--choicy);font-weight:700}
.hbtn{width:40px;height:40px;border:none;border-radius:50%;background:none;color:var(--ink);cursor:pointer;
  display:grid;place-items:center;flex:none}
.hbtn:hover{background:#f1f3f7}
.hbtn .material-symbols-rounded{font-size:23px}
.hbtn.off{color:var(--sub)} .hbtn.active{color:var(--blue)}
.hright{display:flex;gap:6px;align-items:center}
.mode-badge{font-family:var(--font-display);font-size:11px;font-weight:600;color:#fff;background:var(--coral);padding:3px 9px;border-radius:20px;letter-spacing:.5px}
#settings-panel{position:fixed;top:52px;right:10px;z-index:101;background:#fff;border:1px solid var(--line);
  border-radius:13px;box-shadow:var(--shadow-lg);padding:6px;min-width:210px}
.set-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:9px 11px;font-size:14px}
.switch{width:42px;height:25px;border-radius:20px;background:var(--line);border:none;position:relative;cursor:pointer;transition:.15s;flex:none}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on{background:var(--blue)} .switch.on::after{left:20px}

/* ---------- Title ---------- */
.title-screen{display:flex;flex-direction:column;align-items:center;padding-top:3vh;gap:6px;text-align:center}
.choicy-hero{height:76px;width:auto;margin-bottom:10px;animation:float 3.4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-7px) rotate(1deg)}}
.title-accent{color:var(--choicy)}
.brand h1{margin:0;font-size:32px;letter-spacing:.3px}
.tagline{margin:0;color:var(--sub);font-size:14px}
.area-grid{margin-top:30px;display:grid;gap:16px;width:100%;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.area-card{padding:0;border:1px solid var(--line);background:#fff;border-radius:var(--r);overflow:hidden;
  text-align:left;box-shadow:var(--shadow);font:inherit;color:inherit;cursor:pointer;transition:transform .12s,box-shadow .12s}
.area-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.area-thumb{height:140px;background-size:cover;background-position:center}
.area-body{padding:13px 15px}
.area-name{font-weight:700;font-size:18px;display:flex;flex-direction:column}
.area-name span{font-weight:500;font-size:12px;color:var(--sub)}
.area-meta{margin-top:8px;display:flex;align-items:center;gap:10px}
.count{font-size:12px;color:var(--sub)}
.area-card.locked{cursor:default;pointer-events:none;position:relative;box-shadow:none}
.area-card.locked .area-thumb{filter:grayscale(1) brightness(.95);background-color:#cdd6e2}
.area-card.locked .area-body{opacity:.6}
.soon-badge{position:absolute;top:12px;left:12px;background:rgba(27,36,52,.82);color:#fff;font-size:12px;
  font-weight:700;padding:5px 11px;border-radius:20px;letter-spacing:.4px}

/* ---------- Select / map (large + pannable) ---------- */
.select-hint{font-size:12px;color:var(--sub);text-align:center;margin:0 0 10px;display:flex;align-items:center;justify-content:center;gap:5px}
.select-hint .material-symbols-rounded{font-size:16px}
.map-frame{position:relative}
.map-title{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;
  display:flex;align-items:center;gap:6px;font-family:var(--font-display);font-weight:600;font-size:17px;color:var(--ink);
  background:rgba(255,255,255,.94);padding:6px 16px;border-radius:22px;box-shadow:0 4px 14px rgba(20,30,50,.16)}
.map-title .material-symbols-rounded{font-size:19px;color:var(--coral)}
.map-title .sub-mj{font-weight:500;font-size:12px;color:var(--sub)}
.map-viewport{position:relative;height:min(74vh,640px);overflow:auto;border-radius:var(--r);
  box-shadow:var(--shadow);background:#dfeaf2;cursor:grab;-webkit-overflow-scrolling:touch}
.map-viewport.grabbing{cursor:grabbing}
.map-inner{position:relative;width:1500px;max-width:none}
.map-img{display:block;width:100%;height:auto;user-select:none;-webkit-user-drag:none}
.pin{position:absolute;transform:translate(-50%,-50%);border:none;background:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:0}
.pin-dot{width:62px;height:62px;border-radius:50%;background-size:cover;background-position:center;
  border:3px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:transform .12s}
.pin:hover .pin-dot{transform:scale(1.1)}
.pin-label{font-family:var(--font-display);font-weight:600;font-size:16px;color:#fff;background:#ff6b5c;
  border:2px solid #fff;padding:2px 12px;border-radius:20px;margin-top:-12px;position:relative;z-index:3;
  box-shadow:0 2px 7px rgba(0,0,0,.28);white-space:nowrap}
.pin:hover .pin-label{background:#ea4f3f}
.pin .stars{background:rgba(255,255,255,.92);border-radius:20px;padding:2px 7px;box-shadow:0 2px 6px rgba(0,0,0,.15);margin-top:3px}
.pin .star{font-size:16px}

/* ---------- Detail overlay ---------- */
.overlay{position:fixed;inset:0;z-index:90;background:rgba(20,28,44,.45);backdrop-filter:blur(3px);
  display:grid;place-items:center;padding:18px;animation:fade .15s ease both}
@keyframes fade{from{opacity:0}to{opacity:1}}
.detail-card{width:100%;max-width:430px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:var(--shadow-lg);position:relative;animation:rise .2s ease both}
.detail-hero{height:175px;background-size:cover;background-position:center}
.detail-card .close{position:absolute;top:10px;right:10px;width:34px;height:34px;border:none;border-radius:50%;background:rgba(255,255,255,.9);cursor:pointer;display:grid;place-items:center}
.detail-body{padding:18px}
.detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.detail-head h2{margin:0;font-size:22px}
.detail-head .sub-mj{margin:3px 0 0;color:var(--blue-d);font-size:13px;font-weight:600}
.summary{color:#3a4350;font-size:15px;margin:12px 0 4px;line-height:1.5}
.summary.en{font-family:var(--font-serif)}
.summary-mj{color:var(--blue-d);font-size:13px;margin:0 0 12px;line-height:1.5}
.role-label{font-size:12px;color:var(--sub);margin:8px 0 7px;text-transform:uppercase;letter-spacing:.5px}
.role-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.role-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:11px;border:1.5px solid var(--line);background:#fff;border-radius:11px;cursor:pointer;font:inherit;font-weight:600;color:var(--sub)}
.role-btn .material-symbols-rounded{font-size:18px}
.role-btn.on{border-color:var(--blue);color:var(--blue-d);background:#e8f7fe}
.start-btn{margin-top:16px;width:100%;padding:14px;border:none;border-radius:12px;background:var(--blue);color:#fff;font:inherit;font-weight:700;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 8px 20px rgba(0,166,237,.35)}
.start-btn:hover{background:var(--blue-d)}

/* ---------- Scene ---------- */
.scene-screen{display:flex;flex-direction:column;gap:14px}
.stage{position:relative;aspect-ratio:16/9;width:100%;border-radius:var(--r);overflow:hidden;
  background:#cfe0ec center/cover no-repeat;box-shadow:var(--shadow)}
.balloon{position:absolute;bottom:5%;max-width:42%;background:#fff;border-radius:18px;padding:13px 16px;
  font-size:20px;line-height:1.45;box-shadow:0 6px 18px rgba(0,0,0,.18);min-height:42px}
.balloon.left{left:3%} .balloon.right{right:3%;text-align:left}
.balloon::after{content:"";position:absolute;width:17px;height:17px;background:inherit;top:-7px;
  transform:rotate(45deg);border-radius:4px 0 0 0;box-shadow:-3px -3px 7px rgba(0,0,0,.05)}
.balloon.left::after{left:26px} .balloon.right::after{right:26px}
.balloon.mine{outline:2px dashed var(--blue);outline-offset:2px;background:#eaf7fe}
.balloon.talking{animation:pop .4s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.05)}100%{transform:scale(1)}}
.ph-empty{color:#aeb6c2;font-size:24px;letter-spacing:3px}
.ph-manjiro{display:block;color:var(--ink);font-weight:600;font-size:18px}
.ph-gap{display:block;margin-top:6px;color:var(--blue-d);font-size:17px;font-weight:700;letter-spacing:.3px}
.ph-gap .blank{color:var(--coral);text-decoration:none;font-weight:800}
.ph-text{color:#222b36;font-weight:700}
.choicy-tag{position:absolute;top:9px;left:50%;transform:translateX(-50%);font-size:13px;color:#fff;
  background:rgba(0,166,237,.9);padding:3px 10px;border-radius:20px;white-space:nowrap;display:flex;align-items:center}
.intro{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:9px;
  background:rgba(255,255,255,.82);color:var(--ink);font-weight:700;font-size:27px;text-align:center;padding:18px;transition:opacity .25s}
.intro .material-symbols-rounded{font-size:30px;color:var(--blue)}
.intro.hide{opacity:0;pointer-events:none}

.controls{display:flex;gap:12px;justify-content:center;align-items:flex-end}
.ctl{display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--ink);font:inherit}
.ctl:disabled{opacity:.35;cursor:default}
.ctl .material-symbols-rounded{width:54px;height:54px;border-radius:50%;background:#fff;box-shadow:var(--shadow);display:grid;place-items:center;font-size:26px;transition:transform .1s}
.ctl:not(:disabled):hover .material-symbols-rounded{transform:translateY(-2px)}
.ctl label{font-size:11px;color:var(--sub)}
.ctl.rec .material-symbols-rounded{width:76px;height:76px;background:var(--coral);color:#fff;font-size:35px;box-shadow:0 10px 24px rgba(255,107,92,.45)}
.ctl.rec.live .material-symbols-rounded{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,92,.5)}50%{box-shadow:0 0 0 14px rgba(255,107,92,0)}}
.ctl.maxed .material-symbols-rounded{color:var(--star)}

/* ---------- Result ---------- */
.result-screen{display:flex;flex-direction:column;gap:16px;padding-bottom:30px}
.result-head{display:flex;flex-direction:column;align-items:center;gap:10px;padding-top:6px;text-align:center}
.result-head h2{margin:0;font-size:24px}
.result-head.ok h2{color:var(--blue-d)} .result-head.no h2{color:var(--coral-d)}
.choicy-orb{height:62px;width:auto}
.choicy-orb.cheer{animation:bounce .6s ease}
@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-12px)}60%{transform:translateY(-4px)}}
.score-row{display:flex;align-items:center;justify-content:center;gap:18px;background:#fff;border-radius:var(--r);padding:18px 16px;box-shadow:var(--shadow)}
.ring-block{display:flex;flex-direction:column;align-items:center;gap:6px}
.ring{--p:0;--c:var(--blue);border-radius:50%;flex:none;display:grid;place-items:center;background:conic-gradient(var(--c) calc(var(--p)*1%),var(--line) 0);transition:background .5s ease}
.ring.big{width:108px;height:108px} .ring.sm{width:76px;height:76px}
.ring-in{border-radius:50%;background:#fff;display:grid;place-items:center;text-align:center}
.ring.big .ring-in{width:84px;height:84px} .ring.sm .ring-in{width:58px;height:58px}
.ring.big b{font-size:28px;font-family:var(--font-display)} .ring.sm b{font-size:20px;font-family:var(--font-display)}
.ring.sm .ring-in .material-symbols-rounded{font-size:27px;color:var(--ic,var(--c));font-variation-settings:'FILL' 1,'wght' 500,'opsz' 24}
.ring-in small{font-size:10px;color:var(--sub);display:block;margin-top:-3px}
.ring-cap{font-size:11px;color:var(--sub);font-weight:600}
.phrase-card{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--shadow);border-left:6px solid var(--line)}
.phrase-card.band-great{border-left-color:var(--great);background:linear-gradient(#fff,#f4fbf7)}
.phrase-card.band-close{border-left-color:var(--close);background:linear-gradient(#fff,#fdf8ec)}
.phrase-card.band-practice{border-left-color:var(--practice);background:linear-gradient(#fff,#fdf2f1)}
.words{display:flex;flex-wrap:wrap;gap:8px 7px;align-items:flex-start}
.w{display:flex;flex-direction:column;align-items:center;padding:5px 9px;border-radius:9px;line-height:1.2}
.w-en{font-size:19px;font-weight:600}
.w-ipa{font-size:12px;margin-top:2px;font-family:"Times New Roman",serif}
.w-ipa b{color:var(--practice)}
.w-miss{font-size:10px;margin-top:2px;color:#9aa3af;font-weight:600}
.w.great{background:#e7f7ef;color:#176f48} .w.close{background:#fcf2d8;color:#8a6406} .w.practice{background:#fde3e1;color:#9c352d}
.w.missing{background:#eef0f3;color:#9aa3af} .w.missing .w-en{text-decoration:line-through;text-decoration-color:#c2c8d0}
.said{margin:14px 0 0;font-size:13px;color:var(--sub)} .said span{color:var(--ink)}
.legend{display:flex;gap:12px;margin-top:12px}
.lg{font-size:11px;color:var(--sub);display:inline-flex;align-items:center;gap:5px}
.lg::before{content:"";width:11px;height:11px;border-radius:3px}
.lg.great::before{background:var(--great)} .lg.close::before{background:var(--close)} .lg.practice::before{background:var(--practice)} .lg.missing::before{background:#c2c8d0}
/* ---------- Trap (地雷) ---------- */
.trap-card{border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow)}
.trap-card.hit{background:linear-gradient(#fff,#fff6f4);border:1.5px solid var(--coral);border-left:6px solid var(--coral);animation:trapPop .4s ease both}
@keyframes trapPop{0%{transform:scale(.97)}45%{transform:scale(1.015)}100%{transform:scale(1)}}
.trap-head{display:flex;align-items:center;gap:7px;font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--coral-d)}
.trap-head .material-symbols-rounded{font-size:21px;color:var(--coral)}
.trap-said{margin:10px 0 2px;font-size:18px;font-weight:700;color:var(--coral-d)}
.trap-mean{margin:2px 0 0;font-size:15px;color:var(--ink)}
.trap-mean b{font-family:var(--font-serif)}
.trap-ipa{font-family:var(--font-serif);color:var(--sub);font-size:14px;margin-left:3px}
.trap-ja{font-size:12px;color:var(--sub);margin-left:6px}
.trap-fix{margin:10px 0 0;font-size:13px;line-height:1.55;color:var(--blue-d);background:#eaf7fe;border-radius:10px;padding:9px 11px}
.trap-card.safe{display:flex;align-items:center;gap:9px;background:linear-gradient(#fff,#f4fbf7);border:1px solid #cdeede;border-left:6px solid var(--great);font-size:13.5px;line-height:1.5;color:#2c5f48}
.trap-card.safe .material-symbols-rounded{font-size:20px;color:var(--great);flex:none}
.trap-card.safe b{color:#176f48}
.trap-card.safe .trap-ja{color:#5b8a74}
/* ---------- Axis chip (発音崩壊軸タグ / §3-3) ---------- */
.ax-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-display);font-weight:600;font-size:11px;
  padding:2px 9px;border-radius:20px;margin:0 6px 4px 0;vertical-align:middle;white-space:nowrap;border:1px solid transparent}
.ax-chip i{font-style:normal;font-weight:700;font-size:9.5px;letter-spacing:.3px;opacity:.85;
  padding:1px 5px;border-radius:10px;background:rgba(255,255,255,.6)}
.ax-chip.distinguish{background:#eef1ff;color:#3a46b0;border-color:#dde2fb}
.ax-chip.just-fix{background:#e8f7fe;color:var(--blue-d);border-color:#cdeefb}
.trap-head .ax-chip,.trap-card.safe .ax-chip{margin:0 0 0 8px}
/* ---------- Drills (発音特化ドリル / §3-4) ---------- */
.practice-btn{display:inline-flex;align-items:center;gap:3px;margin-top:8px;border:none;cursor:pointer;
  background:var(--choicy);color:#fff;font-family:var(--font-display);font-weight:600;font-size:12.5px;
  padding:7px 13px;border-radius:999px;box-shadow:0 4px 12px rgba(4,89,183,.28)}
.practice-btn .material-symbols-rounded{font-size:17px}
.practice-btn:active{transform:scale(.97)}
.tip-text .practice-btn{margin-top:9px}
.drill-section{margin-top:26px;text-align:left}
.ds-title{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-size:19px;margin:0 0 4px}
.ds-title .material-symbols-rounded{color:var(--blue)}
.ds-title .ds-sub{font-size:12px;font-weight:500;color:var(--sub)}
.ds-grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));margin-top:12px}
.ds-card{display:flex;flex-direction:column;align-items:flex-start;gap:7px;background:#fff;border:1px solid var(--line);
  border-radius:14px;padding:14px;cursor:pointer;box-shadow:var(--shadow);font:inherit}
.ds-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.ds-count{font-size:12px;color:var(--sub);font-weight:600}
.drill-screen{display:flex;flex-direction:column;gap:14px}
.drill-head{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.drill-head h2{margin:8px 0 4px;font-family:var(--font-display);font-size:21px}
.drill-axis{display:flex;align-items:center;gap:8px}
.drill-ch{font-size:11px;color:var(--sub);border:1px solid var(--line);border-radius:20px;padding:1px 9px}
.drill-intro{margin:6px 0 0;color:#3a4350;font-size:14px;line-height:1.55}
.drill-ex{display:flex;flex-wrap:wrap;gap:7px;margin:11px 0 0}
.drill-ex span{font-family:var(--font-serif);font-weight:600;font-size:13px;color:var(--blue-d);background:#eaf7fe;border-radius:8px;padding:3px 10px}
.drill-howto{display:inline-flex;align-items:center;gap:6px;margin-top:14px;border:1.5px solid var(--line);background:#fff;
  border-radius:11px;padding:9px 14px;cursor:pointer;font:inherit;font-weight:600;color:var(--blue-d)}
.drill-howto .material-symbols-rounded{font-size:19px;color:var(--blue)}
.drill-empty{color:var(--sub);text-align:center;padding:30px}
.drill-card{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.dc-head{display:flex;gap:11px;align-items:flex-start}
.dc-num{flex:none;width:24px;height:24px;border-radius:50%;background:var(--blue);color:#fff;font-family:var(--font-display);
  font-weight:700;font-size:13px;display:grid;place-items:center;margin-top:2px}
.dc-text{font-family:var(--font-serif);font-weight:600;font-size:19px;line-height:1.45;color:#222b36}
.dc-text mark.dc-trap{background:transparent;color:var(--coral-d);border-bottom:2px dotted var(--coral);padding-bottom:1px}
.dc-mj{margin:8px 0 0 35px;color:var(--blue-d);font-size:13px;line-height:1.5}
.dc-note{margin:5px 0 0 35px;color:var(--sub);font-size:12.5px;line-height:1.5}
.d-mic{display:inline-flex;align-items:center;gap:7px;margin-top:13px;border:none;cursor:pointer;background:var(--coral);
  color:#fff;font-family:var(--font-display);font-weight:600;font-size:14px;padding:10px 18px;border-radius:999px;
  box-shadow:0 6px 16px rgba(255,107,92,.4)}
.d-mic .material-symbols-rounded{font-size:20px}
.d-mic.live{animation:pulse 1s infinite}
.d-mic:active{transform:scale(.97)}
.d-out{margin-top:4px}
.d-scoring{display:flex;align-items:center;gap:9px;color:var(--sub);font-size:14px;padding:14px 2px}
.d-result{margin-top:13px;border-radius:12px;padding:14px 15px;border:1px solid var(--line)}
.d-result.ok{background:linear-gradient(#fff,#f4fbf7);border-color:#cdeede}
.d-result.no{background:linear-gradient(#fff,#fdf6f5);border-color:#f3d6d2}
.d-resrow{display:flex;gap:14px;align-items:center}
.d-score{flex:none;display:flex;flex-direction:column;align-items:center;justify-content:center;width:58px;height:58px;
  border-radius:50%;background:#fff;box-shadow:var(--shadow)}
.d-score b{font-family:var(--font-display);font-size:21px;line-height:1}
.d-score small{font-size:8px;color:var(--sub);letter-spacing:.5px}
.d-words{display:flex;flex-wrap:wrap;gap:6px}
.d-said{margin:11px 0 0;font-size:12.5px;color:var(--sub)} .d-said span{color:var(--ink)}
.d-comment{margin:6px 0 0;font-size:14px;line-height:1.55;color:var(--ink)}
.d-tips{margin-top:11px;display:flex;flex-direction:column;gap:8px}
.d-tip{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.d-tip-mj{font-size:13px;color:var(--blue-d)}
.comment{margin:-2px 0 4px;font-size:15px;line-height:1.6;color:var(--ink);text-align:center}
.comment-mj{display:none;margin-top:5px;color:var(--blue-d);font-size:13px}
body.subtitle-on .comment-mj{display:block}
.tips-card{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.tips-card h3{margin:0 0 8px;font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--sub)}
.tip{display:flex;gap:13px;align-items:flex-start;padding:11px 0;border-top:1px solid var(--line)}
.tip:first-of-type{border-top:none}
.tip-img{position:relative;flex:0 0 auto;width:96px;height:66px;border-radius:12px;overflow:hidden;background:#f4f7fa;border:1px solid var(--line);cursor:pointer}
.tip-img img{width:100%;height:100%;object-fit:contain;display:block;padding:3px;box-sizing:border-box}
.tip-img .tip-zoom{position:absolute;right:4px;bottom:4px;font-size:16px;color:#fff;background:rgba(20,30,50,.5);border-radius:7px;padding:2px}
.tip-text{flex:1;min-width:0}
.tip-ipa{font-family:var(--font-serif);font-weight:700;color:var(--coral);font-size:15px;margin-right:6px}
.tip-en{font-size:15px;line-height:1.5}
.tip-mj{display:block;margin-top:5px;color:var(--blue-d);font-size:13px}
.lightbox{position:fixed;inset:0;z-index:60;background:rgba(15,20,30,.72);display:grid;place-items:center;padding:24px;opacity:0;transition:opacity .2s}
.lightbox.show{opacity:1}
.lb-inner{position:relative;max-width:min(560px,92vw);max-height:90vh;display:flex;flex-direction:column;align-items:center}
.lb-stage{width:min(520px,86vw);background:#fff;border-radius:16px;padding:10px;box-sizing:border-box;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.lb-stage svg{width:100%;height:auto;display:block}
.lb-stage video.lb-video{width:100%;height:auto;display:block;border-radius:12px;background:#0e1116}
.lb-play{margin-top:14px;border:none;border-radius:999px;padding:11px 20px;cursor:pointer;background:var(--blue);color:#fff;font-family:var(--font-display);font-weight:600;font-size:14.5px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.lb-play:hover{filter:brightness(1.05)}
.lb-play .material-symbols-rounded{font-size:20px}
.lb-cap{text-align:center;color:#fff;font-family:var(--font-serif);font-weight:700;margin-top:12px;font-size:18px}
.lb-text{margin-top:6px;max-width:min(520px,86vw);text-align:center}
.lb-en{color:#fff;font-size:14.5px;line-height:1.5;margin:0}
.lb-mj{color:#dde5ef;font-size:13px;line-height:1.5;margin:6px 0 0}
.lb-close{position:absolute;top:-12px;right:-12px;width:34px;height:34px;border:none;border-radius:50%;background:#fff;color:var(--ink);cursor:pointer;display:grid;place-items:center;box-shadow:0 3px 10px rgba(0,0,0,.3)}
.wave-card{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.wave-card h3{margin:0 0 4px;font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--sub)}
.rhythm-card{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.rhythm-card h3{margin:0 0 8px;font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--sub)}
.r-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin:0 0 8px}
.r-legend span{display:inline-flex;align-items:center;gap:6px}
.r-legend .d{border-radius:50%}
.r-legend .w{width:8px;height:8px;background:#cfd9e4}
.r-legend .s{width:12px;height:12px;background:var(--blue)}
.r-legend .n{width:16px;height:16px;background:var(--choicy)}
.r-track{position:relative;margin-top:10px}
.r-head{position:absolute;top:7px;left:9px;z-index:3;display:flex;align-items:center;gap:7px}
.r-play{flex:none;width:32px;height:32px;border:none;border-radius:50%;cursor:pointer;color:#fff;display:grid;place-items:center;box-shadow:0 3px 9px rgba(0,0,0,.18);transition:transform .1s}
.r-play:not(:disabled):hover{transform:scale(1.07)}
.r-play .material-symbols-rounded{font-size:20px}
.r-play.ex{background:var(--blue)} .r-play.me{background:var(--coral)}
.r-play:disabled{background:#cdd3dd;cursor:default;box-shadow:none}
.r-name{font-family:var(--font-display);font-weight:600;font-size:12.5px;color:var(--sub)}
.rhythm-stage{position:relative;border:1px solid var(--line);border-radius:16px;background:#f5f8fb;padding:44px 8px 16px;overflow-x:auto}
.strip{display:flex;justify-content:flex-start;gap:13px;flex-wrap:nowrap;width:max-content;margin:0 auto}
.chunk{display:flex;gap:6px;padding:0 3px;position:relative}
.chunk + .chunk::before{content:"";position:absolute;left:-7px;top:6px;bottom:18px;width:2px;border-radius:2px;background:repeating-linear-gradient(180deg,#dbe4ee 0 4px,transparent 4px 8px)}
.beat{display:flex;flex-direction:column;align-items:center;gap:9px;min-width:18px}
.dot{flex:0 0 auto;align-self:center;display:block;box-sizing:border-box;width:10px;height:10px;border-radius:50%;background:#cfd9e4;transition:transform .12s ease, background .12s}
.beat.s .dot{width:18px;height:18px;background:var(--blue)}
.beat.n .dot{width:26px;height:26px;background:var(--choicy);box-shadow:0 4px 12px rgba(4,89,183,.3)}
.beat.w .dot{width:10px;height:10px}
.beat.pop .dot{transform:translateY(-9px) scale(1.22)}
.beat .lab{font-family:var(--font-serif);font-size:16px;font-weight:600;color:var(--ink);white-space:nowrap}
.beat.w .lab{font-weight:500;color:#97a3b1;font-size:14px}
.beat.n .lab{color:var(--choicy);font-weight:700}
.r-verdict{margin:12px 0 0;font-size:14px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.r-verdict .rv-icon{font-size:20px;flex:none;margin-top:1px}
.r-verdict.good .rv-icon{color:var(--great)}
.r-verdict.work .rv-icon{color:var(--close)}
.rv-mj{display:none;margin-top:4px;color:var(--blue-d);font-size:13px}
body.subtitle-on .rv-mj{display:block}
.explain{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.explain h3{margin:0 0 6px;font-size:14px;text-transform:uppercase;letter-spacing:.6px;color:var(--sub)}
.exp{padding:12px 0;border-top:1px solid var(--line)}
.exp:first-of-type{border-top:none}
.exp-label{font-size:10px;font-weight:700;color:#fff;background:var(--blue);padding:2px 8px;border-radius:20px;letter-spacing:.4px;margin-right:7px}
.exp-en{font-size:16px;font-weight:600;display:block;margin-top:2px}
.exp-en .ph{font-family:var(--font-serif)}
.exp-mj{font-size:13px;color:var(--blue-d);margin-top:5px}
.result-actions{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-top:4px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px;border:none;border-radius:12px;font:inherit;font-weight:700;font-size:15px;cursor:pointer}
.btn .material-symbols-rounded{font-size:20px}
.btn.primary{background:var(--blue);color:#fff;box-shadow:0 8px 20px rgba(0,166,237,.32)}
.btn.primary:hover{background:var(--blue-d)}
.btn.ghost{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

/* scoring spinner / toast */
.overlay.scoring{flex-direction:column;gap:14px;color:#fff;font-weight:600}
.spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);z-index:120;background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:14px;opacity:0;transition:.25s;max-width:90%}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:560px){
  .balloon{font-size:16px;max-width:44%;padding:10px 12px}
  .ph-manjiro{font-size:15px} .ph-gap{font-size:14px}
  .intro{font-size:21px}
  .score-row{gap:12px;padding:16px 10px}
  .ring.big{width:92px;height:92px} .ring.big .ring-in{width:72px;height:72px} .ring.big b{font-size:24px}
  .ring.sm{width:66px;height:66px} .ring.sm .ring-in{width:50px;height:50px} .ring.sm b{font-size:17px}
  .brand h1{font-size:27px}
  .htitle{font-size:18px}
}
</style>
</head>
<body>
  <header id="topbar">
    <button id="btn-back" class="hbtn" aria-label="Back"><span class="material-symbols-rounded">arrow_back</span></button>
    <div class="htitle">SpeakUp! <b>Choicy</b></div>
    <div class="hright">
      <span id="mode-badge" class="mode-badge" hidden>DEMO</span>
      <button id="btn-settings" class="hbtn" aria-label="Settings"><span class="material-symbols-rounded">settings</span></button>
    </div>
  </header>
  <div id="settings-panel" hidden>
    <div class="set-row"><span>BGM</span><button id="set-bgm" class="switch"></button></div>
    <div class="set-row"><span>字幕（万次郎語）</span><button id="set-cc" class="switch"></button></div>
  </div>

  <main id="app"></main>
  <audio id="bgm" loop preload="auto"></audio>

  <script src="config.js"></script>
  <script src="content.js"></script>
  <script src="taxonomy.js"></script>
  <script src="drills.js"></script>
  <script src="judge.js"></script>
  <script src="app.js"></script>
</body>
</html>
