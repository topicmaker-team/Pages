<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rhythm — チャンクはリズム — SpeakUp! Choicy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0">

<style>
:root{
  --bg:#fff; --ink:#15191f; --sub:#5b6573; --line:#e8edf2; --soft:#f5f8fb;
  --accent:#00A6ED; --choicy:#0459b7; --coral:#ff6b5c; --coral-d:#ea4f3f;
  --good:#1aa56b; --close:#e39a2a; --practice:#ef5350;
  --good-bg:#e7f6ef; --close-bg:#fbf1de; --practice-bg:#fde9e8;
  --shadow:0 1px 2px rgba(20,30,50,.05), 0 8px 24px rgba(20,30,50,.06);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.en{font-family:"Lora",Georgia,serif}
.material-symbols-rounded{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24;line-height:1;vertical-align:middle}
#app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

header{position:sticky;top:0;z-index:5;background:rgba(255,255,255,.86);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:12px 16px}
header .back{border:0;background:var(--soft);color:var(--ink);width:38px;height:38px;border-radius:11px;display:grid;place-items:center;cursor:pointer;font-size:22px}
header .back:hover{background:#eef3f8}
header .back[hidden]{display:none}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:18px}
.brand .choicy{width:30px;height:30px;flex:0 0 auto}
.brand small{color:var(--sub);font-weight:500;font-size:12.5px}
.spacer{flex:1}
.badge{font-family:"Fredoka";font-size:11px;font-weight:600;letter-spacing:.06em;color:#8a94a3;background:var(--soft);border:1px solid var(--line);padding:5px 9px;border-radius:999px}

main{flex:1;padding:22px 16px 96px}
.eyebrow{font-family:"Fredoka";font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
h1.title{font-family:"Fredoka";font-weight:600;font-size:30px;line-height:1.12;margin:0 0 8px;letter-spacing:-.01em}
.lede{color:var(--sub);font-size:14.5px;line-height:1.65;margin:0 0 22px;max-width:54ch}
.lede b{color:var(--ink)}

/* list */
.cards{display:flex;flex-direction:column;gap:12px}
.pcard{border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);background:#fff;padding:16px 18px;cursor:pointer;transition:.16s;display:flex;align-items:center;gap:14px}
.pcard:hover{border-color:#cfe6f8;transform:translateY(-1px)}
.pcard .mini{display:flex;align-items:flex-end;gap:4px;height:30px}
.pcard .mini i{width:7px;border-radius:3px;background:#cfe0ee}
.pcard .mini i.s{background:var(--accent)}
.pcard .mini i.n{background:var(--choicy)}
.pcard .ptext{flex:1;min-width:0}
.pcard .ptext .en{font-weight:600;font-size:16px}
.pcard .ptext small{display:block;color:var(--sub);font-size:12px;margin-top:2px}
.pcard .go{color:#c2ccd8;font-size:22px}

/* rhythm screen */
.phrase-jp{color:var(--sub);font-size:13px;margin:0 0 16px}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--sub);margin:0 0 8px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend .d{border-radius:50%}
.legend .w{width:7px;height:7px;background:#cfd9e4}
.legend .st{width:12px;height:12px;background:var(--accent)}
.legend .nu{width:16px;height:16px;background:var(--choicy)}

.stage{position:relative;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);background:#fff;
  padding:26px 14px 18px;margin:6px 0 4px;overflow:hidden}
#wave{position:absolute;left:0;bottom:48px;width:100%;height:84px;opacity:0;transition:opacity .4s}
#wave.show{opacity:1}
.strip{position:relative;display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
.chunk{display:flex;gap:10px;padding:0 4px;position:relative}
.chunk + .chunk::before{content:"";position:absolute;left:-14px;top:6px;bottom:18px;width:2px;border-radius:2px;background:repeating-linear-gradient(180deg,#dbe4ee 0 4px,transparent 4px 8px)}
.beat{display:flex;flex-direction:column;align-items:center;gap:9px;min-width:34px}
.dot{border-radius:50%;background:#cfd9e4;transition:transform .12s ease, background .12s}
.beat.s .dot{width:18px;height:18px;background:var(--accent)}
.beat.n .dot{width:26px;height:26px;background:var(--choicy);box-shadow:0 4px 12px rgba(4,89,183,.3)}
.beat.w .dot{width:9px;height:9px}
.beat.pop .dot{transform:translateY(-8px) scale(1.25)}
.beat .lab{font-family:"Lora";font-size:16px;font-weight:600;color:var(--ink);white-space:nowrap}
.beat.w .lab{font-weight:500;color:#97a3b1;font-size:14px}
.beat.n .lab{color:var(--choicy);font-weight:700}

.controls{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px 0 2px;flex-wrap:wrap}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.seg button{border:0;background:#fff;color:var(--sub);font-family:"Fredoka";font-weight:600;font-size:12.5px;padding:9px 13px;cursor:pointer;transition:.12s}
.seg button.on{background:var(--accent);color:#fff}
.seg-label{font-size:12px;color:var(--sub)}
.btn{border:0;cursor:pointer;border-radius:12px;font-family:"Fredoka";font-weight:600;font-size:14px;padding:11px 16px;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn.ghost{background:var(--soft);color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{background:#eef3f8}
.btn .material-symbols-rounded{font-size:20px}
.rec{border:0;cursor:pointer;width:72px;height:72px;border-radius:50%;background:var(--coral);color:#fff;display:grid;place-items:center;font-size:32px;box-shadow:0 8px 22px rgba(255,107,92,.35);transition:.15s}
.rec:hover{filter:brightness(1.05)}
.rec.live{background:var(--practice);animation:pulse 1.1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,83,80,.45)}70%{box-shadow:0 0 0 16px rgba(239,83,80,0)}100%{box-shadow:0 0 0 0 rgba(239,83,80,0)}}
.hint{text-align:center;font-size:12.5px;color:#9aa6b4;min-height:1.2em;margin-top:8px}

/* result */
.result{margin-top:18px}
.meter{border:1px solid var(--line);border-radius:16px;padding:16px 18px;background:#fff;box-shadow:var(--shadow)}
.meter h3{font-family:"Fredoka";font-weight:600;font-size:14px;margin:0 0 4px;display:flex;align-items:center;gap:7px}
.meter h3 .material-symbols-rounded{font-size:19px;color:var(--accent)}
.meter .scale{position:relative;height:12px;border-radius:999px;margin:12px 0 6px;
  background:linear-gradient(90deg,#fde2df,#fbeecb,#dcf3e8)}
.meter .scale .knob{position:absolute;top:50%;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--choicy);transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(0,0,0,.15);transition:left .5s cubic-bezier(.3,1,.4,1)}
.meter .ends{display:flex;justify-content:space-between;font-size:11.5px;color:#9aa6b4}
.verdict{margin-top:14px;border-radius:16px;padding:15px 16px;border:1px solid var(--line);font-size:14px;line-height:1.65}
.verdict.is-great{background:var(--good-bg);border-color:#c8ebda}
.verdict.is-close{background:var(--close-bg);border-color:#f1e0c0}
.verdict.is-practice{background:var(--practice-bg);border-color:#f6cfcd}
.verdict .top{display:flex;align-items:center;gap:8px;font-family:"Fredoka";font-weight:600;font-size:15px;margin-bottom:6px}
.verdict.is-great .top{color:var(--good)}
.verdict.is-close .top{color:#c4861c}
.verdict.is-practice .top{color:#d34b46}
.verdict .key{color:var(--choicy);font-weight:700;font-family:"Lora"}
.verdict .flat{color:var(--coral-d);font-weight:700}
.facts{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.fact{font-size:12px;color:var(--sub);background:var(--soft);border:1px solid var(--line);border-radius:999px;padding:6px 11px}
.fact b{color:var(--ink);font-family:"Fredoka"}
.redo{display:block;margin:14px auto 0;background:none;border:0;color:var(--accent);font-size:13px;cursor:pointer;text-decoration:underline}

.note{margin-top:26px;font-size:12.5px;color:#9aa6b4;line-height:1.6;border-top:1px dashed var(--line);padding-top:16px}

@media (max-width:560px){h1.title{font-size:26px}.strip{gap:12px}.beat{min-width:28px}.beat .lab{font-size:14px}}
@media (prefers-reduced-motion:reduce){.beat,.dot{transition:none!important}}
</style>

<div id="app">
  <header>
    <button class="back" id="back" hidden aria-label="Back"><span class="material-symbols-rounded">arrow_back</span></button>
    <div class="brand">
      <svg class="choicy" viewBox="0 0 84 73" aria-hidden="true"><path fill="#0459b7" d="M42 4C20 4 4 18 4 37c0 12 7 22 19 28-2 4-6 7-6 7s11-1 18-6c2 .3 5 .4 7 .4 22 0 38-14 38-33S64 4 42 4z"/><circle cx="30" cy="35" r="5" fill="#fff"/><circle cx="54" cy="35" r="5" fill="#fff"/></svg>
      <span>Rhythm <small>チャンクはリズム</small></span>
    </div>
    <span class="spacer"></span>
    <span class="badge" id="badge">DEMO</span>
  </header>
  <main id="main"></main>
</div>

<script>
/* ============================================================
   Rhythm Lab — prototype  (チャンク＝リズム)
   ビート: 0=弱(機能語) 1=強(内容語) 2=核(一番の山)
   発話チェック = 録音→Web Audioで振幅エンベロープ→強弱の波(dynamics)を判定
   APIキー不要・音声ファイル不要（お手本はspeechSynthesis）。
   ============================================================ */

/* 実データ(content.js)の5フレーズにビートを付与（chunks_enと一致） */
const PHRASES = [
  { id:"S01_V1_Q", scene:"ABC Store ★1", jp:"どこで見つけられるか　日焼け止め？",
    chunks:[ [["Where",1],["can",0],["I",0],["find",1]], [["sunscreen",2]] ] },
  { id:"S02_V1_Q", scene:"Waikiki Beach ★1", jp:"借りられますか　ビーチチェア？",
    chunks:[ [["Can",0],["I",0],["rent",1]], [["a",0],["beach",1],["chair",2]] ] },
  { id:"S03_V1_A", scene:"Garlic Shrimp ★1.5", jp:"もちろん　欲しいですか　追加ライス？",
    chunks:[ [["Sure",1]], [["do",0],["you",0],["want",1]], [["extra",1],["rice",2]] ] },
  { id:"S04_V3_Q", scene:"Street ★1.5", jp:"トイレどこ？　緊急です！",
    chunks:[ [["Where's",1],["the",0],["restroom",2]], [["It's",0],["urgent",2]] ] },
  { id:"S05_V1_Q", scene:"Diamond Head ★2", jp:"結婚してくれますか　ここ頂上で？",
    chunks:[ [["Will",0],["you",0],["marry",1],["me",0]], [["here",1],["at",0],["the",0],["top",2]] ] }
];

const $=(s,r=document)=>r.querySelector(s);
const el=h=>{const t=document.createElement('template');t.innerHTML=h.trim();return t.content.firstElementChild;};
const MAIN=$('#main'), BACK=$('#back');
function show(n){MAIN.innerHTML='';MAIN.appendChild(n);window.scrollTo(0,0);}
function setBack(fn){if(fn){BACK.hidden=false;BACK.onclick=fn;}else{BACK.hidden=true;BACK.onclick=null;}}
function flat(p){return p.chunks.flat();}                 // [[word,strength],...]
function words(p){return flat(p).map(w=>w[0]);}
function text(p){return words(p).join(' ').replace(/ ([?!,.])/g,'$1');}
function weakSamples(p){return flat(p).filter(w=>w[1]===0).map(w=>w[0]).slice(0,3);}

/* duration per beat (お手本リズム＆期待位置に使用) ms */
const DUR={0:190,1:340,2:430}, GAP=170;
function beatTimes(p){ // 各語の中心時刻(正規化0..1)と総時間
  let t=0; const centers=[]; p.chunks.forEach((ch,ci)=>{ if(ci) t+=GAP;
    ch.forEach(w=>{const d=DUR[w[1]]; centers.push({t:t+d/2,str:w[1],word:w[0]}); t+=d;});
  });
  return {centers:centers.map(c=>({...c,t:c.t/t})), total:t};
}

/* ---------- 画面1：フレーズ一覧 ---------- */
function renderList(){
  setBack(null);
  const wrap=el(`<div>
    <p class="eyebrow">Chunk = rhythm</p>
    <h1 class="title">チャンクはリズム</h1>
    <p class="lede">英語は<b>強い拍と弱い拍の波</b>で進みます。内容語で山を作り、機能語は弱く速く。チャンクごとに山は1つ、文全体で<b>一番の山（核）</b>も1つ。お手本でリズムを感じ、声に出して波が出せているかチェックしましょう。</p>
    <div class="cards" id="cards"></div>
    <p class="note">判定は録音した声の<b>エネルギーの強弱（波）</b>をブラウザ内で解析します（APIキー不要）。音そのものの正誤ではなく「平らか／波があるか＝英語のリズムになっているか」を見ます。</p>
  </div>`);
  const host=$('#cards',wrap);
  PHRASES.forEach(p=>{
    const mini=flat(p).map(w=>`<i class="${w[1]===2?'n':w[1]===1?'s':''}" style="height:${w[1]===2?28:w[1]===1?20:11}px"></i>`).join('');
    const c=el(`<div class="pcard">
      <div class="mini">${mini}</div>
      <div class="ptext"><span class="en">${text(p)}</span><small>${p.scene}</small></div>
      <span class="go material-symbols-rounded">chevron_right</span>
    </div>`);
    c.onclick=()=>renderRhythm(p);
    host.appendChild(c);
  });
  show(wrap);
}

/* ---------- 画面2：リズム ---------- */
let AC=null; function ctx(){return AC||(AC=new (window.AudioContext||window.webkitAudioContext)());}
let recState={active:false};
let EXAG=true;  // お手本の強調モード（true=おおげさ）

function renderRhythm(p){
  setBack(renderList);
  const strip=p.chunks.map(ch=>`<div class="chunk">${ch.map(w=>{
    const cls=w[1]===2?'n':w[1]===1?'s':'w';
    return `<div class="beat ${cls}"><span class="dot"></span><span class="lab">${w[0]}</span></div>`;
  }).join('')}</div>`).join('');

  const wrap=el(`<div>
    <p class="eyebrow">${p.scene}</p>
    <h1 class="title en" style="font-size:25px">${text(p)}</h1>
    <p class="phrase-jp">${p.jp}</p>
    <div class="legend">
      <span><i class="d w"></i>弱く速く（機能語）</span>
      <span><i class="d st"></i>強く長く（内容語）</span>
      <span><i class="d nu"></i>一番の山（核）</span>
    </div>
    <div class="stage">
      <canvas id="wave"></canvas>
      <div class="strip" id="strip">${strip}</div>
    </div>
    <div class="controls">
      <button class="btn ghost" id="hear"><span class="material-symbols-rounded">volume_up</span>お手本</button>
      <span class="seg-label">強調</span>
      <div class="seg" id="exag">
        <button data-x="0">ふつう</button>
        <button data-x="1" class="on">おおげさ</button>
      </div>
      <button class="btn ghost" id="beat"><span class="material-symbols-rounded">graphic_eq</span>リズム</button>
    </div>
    <div class="controls"><button class="rec" id="rec"><span class="material-symbols-rounded">mic</span></button></div>
    <div class="hint" id="hint">Tap to record · ${text(p)}</div>
    <div class="result" id="result"></div>
  </div>`);

  $('#hear',wrap).onclick=()=>sayPhrase(p,wrap,EXAG);
  $('#exag',wrap).querySelectorAll('button').forEach(b=>b.onclick=()=>{
    EXAG=b.dataset.x==='1';
    $('#exag',wrap).querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    sayPhrase(p,wrap,EXAG);
  });
  $('#beat',wrap).onclick=()=>playBeat(p,wrap);
  wireRec(p,$('#rec',wrap),$('#hint',wrap),$('#result',wrap),wrap);
  show(wrap);
  setTimeout(()=>playBeat(p,wrap),350);
}

/* お手本（語）＝ speechSynthesis */
/* お手本：ふつう＝文全体を自然に / おおげさ＝語ごとに強弱を付けてリズムを強調 */
const STRESS = {  // 0=弱(機能語) 1=強(内容語) 2=核
  0:{rate:1.35, pitch:0.8,  vol:0.55},
  1:{rate:0.80, pitch:1.20, vol:1.0 },
  2:{rate:0.60, pitch:1.42, vol:1.0 }
};
function sayPhrase(p,wrap,exag){
  try{speechSynthesis.cancel();}catch(e){}
  if(!exag){
    try{const u=new SpeechSynthesisUtterance(text(p));u.lang='en-US';u.rate=.95;speechSynthesis.speak(u);}catch(e){}
    return;
  }
  const beats=wrap?[...wrap.querySelectorAll('.beat')]:[];
  const seq=flat(p); let i=0;
  const speakNext=()=>{
    if(i>=seq.length)return;
    const w=seq[i], s=STRESS[w[1]];
    const b=beats[i]; if(b){b.classList.add('pop');setTimeout(()=>b.classList.remove('pop'),180);}
    let u;
    try{u=new SpeechSynthesisUtterance(w[0]);}catch(e){return;}
    u.lang='en-US'; u.rate=s.rate; u.pitch=s.pitch; u.volume=s.vol;
    u.onend=()=>{ const gap=(w[1]===2?240:0)+(isChunkEnd(p,i)?210:50); i++; setTimeout(speakNext,gap); };
    u.onerror=()=>{ i++; setTimeout(speakNext,60); };
    speechSynthesis.speak(u);
  };
  speakNext();
}

/* リズム＝ビートを順に光らせ、強い拍でクリック音 */
function playBeat(p,wrap){
  const beats=[...wrap.querySelectorAll('.beat')];
  const seq=flat(p); let t=0; const c=ctx();
  if(c.state==='suspended')c.resume();
  seq.forEach((w,i)=>{
    const d=DUR[w[1]];
    setTimeout(()=>{
      const b=beats[i]; if(!b)return; b.classList.add('pop'); setTimeout(()=>b.classList.remove('pop'),150);
      if(w[1]>=1) click(c, w[1]===2?740:520, w[1]===2?.18:.12);
    }, t);
    t+=d + (isChunkEnd(p,i)?GAP:0);
  });
}
function isChunkEnd(p,idx){let n=0;for(const ch of p.chunks){n+=ch.length;if(idx===n-1)return true;}return false;}
function click(c,freq,gain){
  const o=c.createOscillator(),g=c.createGain();
  o.frequency.value=freq;o.type='sine';
  g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(gain,c.currentTime+.01);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+.16);
  o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.18);
}

/* ---------- 録音 → 解析 ---------- */
function setLive(btn,hint,on,msg){recState.active=on;btn.classList.toggle('live',on);
  btn.querySelector('.material-symbols-rounded').textContent=on?'stop':'mic';hint.textContent=msg||'';}
function wireRec(p,btn,hint,out,wrap){
  btn.onclick=async ()=>{
    if(recState.active){recState.stop&&recState.stop();return;}
    out.innerHTML=''; $('#wave',wrap).classList.remove('show');
    let stream;
    try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}
    catch(e){ hint.textContent='マイクが使えないので擬似データを表示します'; return simulate(p,out,wrap); }
    const mr=new MediaRecorder(stream); const chunks=[];
    mr.ondataavailable=e=>chunks.push(e.data);
    recState.stop=()=>{try{mr.stop();}catch(e){}};
    mr.onstop=async ()=>{
      stream.getTracks().forEach(t=>t.stop());
      setLive(btn,hint,false,'解析中…');
      try{
        const buf=await ctx().decodeAudioData(await new Blob(chunks).arrayBuffer());
        const env=envelope(buf);
        if(env.voiced<6){ hint.textContent='声が短すぎるかも。もう一度'; return; }
        const m=analyze(p,env); renderResult(p,out,wrap,m,env); hint.textContent='Tap to record again';
      }catch(e){ console.error(e); hint.textContent='解析に失敗。擬似データを表示'; simulate(p,out,wrap); }
    };
    mr.start(); setLive(btn,hint,true,'録音中… 終わったらStop');
  };
}

/* 振幅エンベロープ（RMS, 25ms/10ms）→ 無音トリム＋平滑＋正規化 */
function envelope(buf){
  const d=buf.getChannelData(0), sr=buf.sampleRate;
  const fr=Math.floor(sr*.025), hop=Math.floor(sr*.010);
  let e=[];
  for(let i=0;i+fr<d.length;i+=hop){let s=0;for(let j=0;j<fr;j++){const v=d[i+j];s+=v*v;}e.push(Math.sqrt(s/fr));}
  const mx=Math.max(...e,1e-6);
  const th=mx*0.08;
  let a=0,b=e.length-1; while(a<b&&e[a]<th)a++; while(b>a&&e[b]<th)b--;
  e=e.slice(a,b+1);
  // smooth (moving avg 5)
  const sm=e.map((_,i)=>{let s=0,c=0;for(let k=-2;k<=2;k++){const j=i+k;if(j>=0&&j<e.length){s+=e[j];c++;}}return s/c;});
  const m2=Math.max(...sm,1e-6);
  const norm=sm.map(v=>v/m2);
  return {env:norm, voiced:norm.filter(v=>v>0.12).length};
}

/* 解析：強弱の波(dynamics) / 山の数 / 核の位置 */
function analyze(p,E){
  const e=E.env;
  // dynamics = 変動の大きさ（平ら→小, 波→大）
  const mean=e.reduce((a,v)=>a+v,0)/e.length;
  const sd=Math.sqrt(e.reduce((a,v)=>a+(v-mean)**2,0)/e.length);
  const cv=sd/(mean||1e-6);                       // 0.3平ら〜0.7波
  // ピーク検出（山の数）
  const peaks=[]; const minDist=12;
  for(let i=1;i<e.length-1;i++){
    if(e[i]>0.42 && e[i]>=e[i-1] && e[i]>e[i+1]){
      if(!peaks.length||i-peaks[peaks.length-1]>=minDist)peaks.push(i);
    }
  }
  const expected=flat(p).filter(w=>w[1]>=1).length;
  // 核：最大ピークの位置 vs 期待位置
  let gi=0; e.forEach((v,i)=>{if(v>e[gi])gi=i;});
  const userNuc=gi/(e.length-1);
  const bt=beatTimes(p); const nucBeat=[...bt.centers].reverse().find(c=>c.str===2)||bt.centers[bt.centers.length-1];
  const nucOk=Math.abs(userNuc-nucBeat.t)<=0.22;
  // スコア（0..100）：波の大きさを主、ピーク過多（音節リズム）を減点
  let score=Math.round(Math.min(1,Math.max(0,(cv-0.30)/(0.62-0.30)))*100);
  if(peaks.length>expected+2) score=Math.max(0,score-18); // 平らに小山が多い＝日本語拍
  const level=score>=65?'great':score>=40?'close':'practice';
  return {score,level,cv,peaks:peaks.length,expected,nucOk,nucWord:nucBeat.word};
}

function renderResult(p,out,wrap,m,E){
  drawWave(wrap,E.env,p);
  $('#wave',wrap).classList.add('show');
  const nuc=m.nucWord, weak=weakSamples(p);
  let body;
  if(m.level==='great'){
    body=`強弱の<b>波が出ています</b>！内容語で山、機能語(<span class="key">${weak.join(', ')}</span>)は弱く——これが英語のリズムです。一番の山も <span class="key">${nuc}</span> ${m.nucOk?'に乗っています':'に寄せるとさらに◎'}。`;
  }else if(m.level==='close'){
    body=`方向はOK。もう少し<b>差</b>をつけましょう。<span class="key">${nuc}</span> をもっと強く長く、<span class="flat">${weak.join(', ')}</span> をもっと弱く速く。`;
  }else{
    body=`<span class="flat">平ら</span>になりがちです（日本語の等間隔リズム）。まず <span class="key">${nuc}</span> で<b>大きな山を1つ</b>作り、<span class="flat">${weak.join(', ')}</span> を一気に弱く言ってみて。`;
  }
  const icon=m.level==='great'?'check_circle':m.level==='close'?'change_circle':'cancel';
  const head=m.level==='great'?'英語のリズム！':m.level==='close'?'あと一歩':'もっと波を';
  const r=el(`<div>
    <div class="meter">
      <h3><span class="material-symbols-rounded">stacked_line_chart</span>強弱の波（リズム）</h3>
      <div class="scale"><span class="knob" style="left:${Math.max(4,Math.min(96,m.score))}%"></span></div>
      <div class="ends"><span>平ら（日本語拍）</span><span>波がある（英語拍）</span></div>
    </div>
    <div class="verdict is-${m.level}">
      <div class="top"><span class="material-symbols-rounded">${icon}</span>${head}</div>
      <div>${body}</div>
      <div class="facts">
        <span class="fact">山の数 <b>${m.peaks}</b> / 内容語 <b>${m.expected}</b></span>
        <span class="fact">核の位置 <b>${m.nucOk?'OK':'要調整'}</b></span>
        <span class="fact">波の強さ <b>${m.score}</b></span>
      </div>
      <button class="redo" id="redo">お手本をもう一度 → 録り直す</button>
    </div>
  </div>`);
  $('#redo',r).onclick=()=>{ out.innerHTML=''; $('#wave',wrap).classList.remove('show'); playBeat(p,wrap); };
  out.appendChild(r); r.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ユーザーのエンベロープを stage に重ね描き＋期待ビート位置のガイド */
function drawWave(wrap,env,p){
  const cv=$('#wave',wrap), strip=$('#strip',wrap);
  const W=cv.offsetWidth||strip.offsetWidth||cv.parentElement.offsetWidth, H=84, dpr=window.devicePixelRatio||1;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+'px';
  const g=cv.getContext('2d'); g.scale(dpr,dpr); g.clearRect(0,0,W,H);
  // ガイド線（期待する山の位置）
  const bt=beatTimes(p);
  bt.centers.forEach(c=>{ if(c.str>=1){ const x=c.t*W;
    g.strokeStyle=c.str===2?'rgba(4,89,183,.35)':'rgba(0,166,237,.25)'; g.lineWidth=c.str===2?2:1.2;
    g.beginPath(); g.moveTo(x,6); g.lineTo(x,H); g.stroke(); } });
  // エンベロープ曲線（塗り）
  g.beginPath(); g.moveTo(0,H);
  env.forEach((v,i)=>{const x=i/(env.length-1)*W, y=H-v*(H-8)-4; g.lineTo(x,y);});
  g.lineTo(W,H); g.closePath();
  const grad=g.createLinearGradient(0,0,0,H); grad.addColorStop(0,'rgba(0,166,237,.30)'); grad.addColorStop(1,'rgba(0,166,237,.04)');
  g.fillStyle=grad; g.fill();
  g.beginPath(); env.forEach((v,i)=>{const x=i/(env.length-1)*W,y=H-v*(H-8)-4; i?g.lineTo(x,y):g.moveTo(x,y);});
  g.strokeStyle='rgba(0,140,210,.8)'; g.lineWidth=2; g.stroke();
}

/* 擬似（マイク無し） */
function simulate(p,out,wrap){
  const n=120, env=[]; const flatish=Math.random()<.5;
  const bt=beatTimes(p);
  for(let i=0;i<n;i++){ const t=i/(n-1); let v=0.25+0.12*Math.random();
    bt.centers.forEach(c=>{ const amp=flatish?(c.str>=1?.35:.28):(c.str===2?.95:c.str===1?.7:.3);
      v=Math.max(v, amp*Math.exp(-((t-c.t)**2)/0.0025)); });
    env.push(Math.min(1,v));
  }
  const m=analyze(p,{env,voiced:n}); renderResult(p,out,wrap,m,{env}); 
  out.querySelector('.facts').insertAdjacentHTML('beforeend','<span class="fact">（擬似データ）</span>');
}

/* boot */
const hasMic = !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia);
$('#badge').textContent = hasMic?'DEMO · マイクで実判定':'DEMO';
if('speechSynthesis' in window) speechSynthesis.getVoices();
renderList();
</script>
